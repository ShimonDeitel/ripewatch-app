name: Ripewatch
options:
  bundleIdPrefix: com.shimondeitel.ripewatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Ripewatch:
    type: application
    platform: iOS
    sources:
      - path: Ripewatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ripewatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Ripewatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RipewatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RipewatchTests
      - path: Ripewatch.storekit
    dependencies:
      - target: Ripewatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ripewatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RipewatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RipewatchUITests
    dependencies:
      - target: Ripewatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ripewatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Ripewatch:
    build:
      targets:
        Ripewatch: all
        RipewatchTests: [test]
        RipewatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Ripewatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Ripewatch.storekit
      targets:
        - RipewatchTests
        - RipewatchUITests
    archive:
      config: Release
